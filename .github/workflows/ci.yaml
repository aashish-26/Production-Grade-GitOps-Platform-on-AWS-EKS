# CI pipeline: build, scan, push, and update GitOps repo
# - Uses OIDC to assume an AWS role for push to ECR
# - Uses commit SHA as image tag (immutable tags)
# TODO: ADD REPO URL and ROLE ARN where indicated below

name: CI

on:
  push:
    branches: [ main ]

permissions:
  id-token: write # required for OIDC
  contents: read
  packages: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }} # TODO: ADD ROLE ARN (create IAM role for OIDC assume)
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Set image variables
        run: |
          IMAGE_REPO_API=${{ secrets.ECR_API_REPO }} # TODO: USER_ACTION_REQUIRED set in repo secrets
          IMAGE_REPO_WORKER=${{ secrets.ECR_WORKER_REPO }} # TODO: USER_ACTION_REQUIRED set in repo secrets
          IMAGE_TAG=${{ github.sha }}
          echo "IMAGE_REPO_API=$IMAGE_REPO_API" >> $GITHUB_ENV
          echo "IMAGE_REPO_WORKER=$IMAGE_REPO_WORKER" >> $GITHUB_ENV
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Build API image
        run: |
          docker build -t $IMAGE_REPO_API:$IMAGE_TAG -f app-repo/api/Dockerfile app-repo/api
          docker tag $IMAGE_REPO_API:$IMAGE_TAG $IMAGE_REPO_API:latest

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.IMAGE_REPO_API }}:${{ env.IMAGE_TAG }}
          format: 'table'

      - name: Build worker image
        run: |
          docker build -t $IMAGE_REPO_WORKER:$IMAGE_TAG -f app-repo/worker/Dockerfile app-repo/worker
          docker tag $IMAGE_REPO_WORKER:$IMAGE_TAG $IMAGE_REPO_WORKER:latest

      - name: Scan worker image with Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.IMAGE_REPO_WORKER }}:${{ env.IMAGE_TAG }}
          format: 'table'

      - name: Push image to ECR
        run: |
          docker push $IMAGE_REPO_API:$IMAGE_TAG
          docker push $IMAGE_REPO_API:latest

      - name: Push worker image to ECR
        run: |
          docker push $IMAGE_REPO_WORKER:$IMAGE_TAG
          docker push $IMAGE_REPO_WORKER:latest

      - name: Update GitOps repo (helm values)
        env:
          GITOPS_REPO: ${{ secrets.GITOPS_REPO }} # TODO: ADD REPO URL
          GITOPS_BRANCH: main
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          GITOPS_TOKEN: ${{ secrets.GITOPS_TOKEN }} # TODO: PAT with repo write access
        run: |
          # This step clones the GitOps repo, updates the values file for dev (example), and pushes a commit.
          AUTHED_REPO=${GITOPS_REPO/https:\/\//https:\/\/$GITOPS_TOKEN@}
          git clone $AUTHED_REPO gitops
          cd gitops
          git checkout $GITOPS_BRANCH || git checkout -b $GITOPS_BRANCH
          # Update values-dev.yaml: replace image.tag for API and worker
          sed -i 's/tag:.*/tag: "'"$IMAGE_TAG"'"/' gitops-repo/helm/api-service/values-dev.yaml
          sed -i 's/tag:.*/tag: "'"$IMAGE_TAG"'"/' gitops-repo/helm/worker-service/values-dev.yaml
          git add gitops-repo/helm/api-service/values-dev.yaml
          git add gitops-repo/helm/worker-service/values-dev.yaml
          git config user.email "ci-bot@users.noreply.github.com"
          git config user.name "ci-bot"
          git commit -m "chore: update images to $IMAGE_TAG [ci skip]"
          git push origin HEAD:$GITOPS_BRANCH

