apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: app-secrets
  namespace: dev
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: app-secrets
  data:
  - secretKey: DB_PASSWORD
    remoteRef:
      key: "# TODO: ADD_SECRET_NAME" # AWS Secrets Manager secret name
      property: password

# TODO: USER_ACTION_REQUIRED - replace # TODO: ADD_SECRET_NAME with the secret resource name in AWS Secrets Manager
