# Default values for api-service
replicaCount: 2
image:
  repository: "# TODO: set in environment specific values or replaced by CI"
  tag: "latest"
  pullPolicy: IfNotPresent

sqs:
  # TODO: set per environment (queue URL used by the API to send jobs)
  queueUrl: "https://sqs.ap-south-1.amazonaws.com/848928399250/gitops-app-queue"
awsRegion: "ap-south-1"

# Annotations consumed by ArgoCD Image Updater or other tooling
imageUpdater:
  enabled: false
  annotations: {}
service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# KEDA/HPA related defaults
hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 50

# Liveness/readiness
readinessProbe:
  path: /health
  port: 8080

livenessProbe:
  path: /health
  port: 8080

serviceAccount:
  create: true
  name: api-sa
  # IRSA annotation goes here per environment values
  annotations: {}
