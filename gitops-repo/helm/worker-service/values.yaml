# Default values for worker-service
replicaCount: 1
image:
  repository: "848928399250.dkr.ecr.ap-south-1.amazonaws.com/worker-service"
  tag: "latest"
  pullPolicy: IfNotPresent
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

keda:
  enabled: true
  minReplicaCount: 1
  maxReplicaCount: 10
  pollingInterval: 30
  cooldownPeriod: 300

sqs:
  # TODO: set per environment (queue URL used by the worker to receive jobs)
  queueUrl: "https://sqs.ap-south-1.amazonaws.com/848928399250/gitops-app-queue"
awsRegion: "ap-south-1"

serviceAccount:
  create: true
  name: worker-sa
  # IRSA annotation goes here per environment values
  annotations: {}

imageUpdater:
  enabled: false
  annotations: {}
