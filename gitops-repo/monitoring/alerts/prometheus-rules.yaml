# PrometheusRule resources; requires kube-prometheus-stack CRDs in the cluster.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: gitops-platform-alerts
  namespace: monitoring
spec:
  groups:
  - name: gitops-platform.rules
    rules:

    - alert: PodCrashLooping
      expr: |
        sum(increase(kube_pod_container_status_restarts_total{container!="",pod!=""}[10m])) 
        by (namespace, pod) > 3
      for: 10m
      labels:
        severity: warning
        team: platform
        service: kubernetes
      annotations:
        summary: "Pod restart loop detected"
        description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} restarted more than 3 times in 10 minutes."

    - alert: PodCrashLoopingCritical
      expr: |
        kube_pod_container_status_waiting_reason{reason="CrashLoopBackOff"} == 1
      for: 5m
      labels:
        severity: critical
        team: platform
        service: kubernetes
      annotations:
        summary: "Pod in CrashLoopBackOff"
        description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is stuck in CrashLoopBackOff."

    - alert: HighCpuUsage
      expr: |
        (
          sum(rate(container_cpu_usage_seconds_total{container!="",pod!=""}[5m])) 
          by (namespace, pod)
          /
          sum(kube_pod_container_resource_requests{resource="cpu"}) 
          by (namespace, pod)
        ) > 0.8
      for: 10m
      labels:
        severity: warning
        team: platform
        service: kubernetes
      annotations:
        summary: "High CPU usage"
        description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is using more than 80% of requested CPU."

    - alert: HighCpuUsageCritical
      expr: |
        (
          sum(rate(container_cpu_usage_seconds_total{container!="",pod!=""}[5m])) 
          by (namespace, pod)
          /
          sum(kube_pod_container_resource_limits{resource="cpu"}) 
          by (namespace, pod)
        ) > 0.9
      for: 5m
      labels:
        severity: critical
        team: platform
        service: kubernetes
      annotations:
        summary: "Critical CPU usage"
        description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is above 90% CPU limit."

    - alert: SqsQueueBacklog
      expr: |
        aws_sqs_approximate_number_of_messages_visible{queue_name="gitops-app-queue"} > 100
      for: 10m
      labels:
        severity: warning
        team: platform
        service: sqs
      annotations:
        summary: "SQS queue backlog"
        description: "Queue gitops-app-queue has more than 100 visible messages."

    - alert: SqsQueueBacklogCritical
      expr: |
        aws_sqs_approximate_number_of_messages_visible{queue_name="gitops-app-queue"} > 500
      for: 5m
      labels:
        severity: critical
        team: platform
        service: sqs
      annotations:
        summary: "Critical SQS backlog"
        description: "Queue gitops-app-queue has more than 500 visible messages."
