apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-k8s-pods
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  k8s-pods-dashboard.json: |
    {
      "annotations": { "list": [] },
      "panels": [
        {
          "type": "timeseries",
          "title": "CPU Usage (cores)",
          "datasource": "Prometheus",
          "targets": [
            { "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"$namespace\",pod=~\"$pod\",container!=\"\"}[5m])) by (pod)", "refId": "A" }
          ]
        },
        {
          "type": "timeseries",
          "title": "Memory Usage (bytes)",
          "datasource": "Prometheus",
          "targets": [
            { "expr": "sum(container_memory_working_set_bytes{namespace=\"$namespace\",pod=~\"$pod\",container!=\"\"}) by (pod)", "refId": "B" }
          ]
        },
        {
          "type": "timeseries",
          "title": "Pod Restarts (15m)",
          "datasource": "Prometheus",
          "targets": [
            { "expr": "sum(increase(kube_pod_container_status_restarts_total{namespace=\"$namespace\",pod=~\"$pod\"}[15m])) by (pod)", "refId": "C" }
          ]
        }
      ],
      "templating": {
        "list": [
          { "name": "namespace", "type": "query", "datasource": "Prometheus", "query": "label_values(kube_pod_info, namespace)", "refresh": 2 },
          { "name": "pod", "type": "query", "datasource": "Prometheus", "query": "label_values(kube_pod_info{namespace=\"$namespace\"}, pod)", "refresh": 2 }
        ]
      },
      "schemaVersion": 30,
      "version": 1,
      "title": "K8s Pod Resources"
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-api-requests
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  api-requests-dashboard.json: |
    {
      "annotations": { "list": [] },
      "panels": [
        {
          "type": "timeseries",
          "title": "API Request Rate (req/s)",
          "datasource": "Prometheus",
          "targets": [
            { "expr": "sum(rate(http_requests_total{namespace=\"$namespace\"}[1m]))", "refId": "A" }
          ]
        }
      ],
      "templating": {
        "list": [
          { "name": "namespace", "type": "query", "datasource": "Prometheus", "query": "label_values(kube_pod_info, namespace)", "refresh": 2 }
        ]
      },
      "schemaVersion": 30,
      "version": 1,
      "title": "API Request Rate"
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-sqs-queue
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  sqs-queue-dashboard.json: |
    {
      "annotations": { "list": [] },
      "panels": [
        {
          "type": "timeseries",
          "title": "SQS Queue Depth",
          "datasource": "Prometheus",
          "targets": [
            { "expr": "sqs_approximate_number_of_messages_visible{queue=\"gitops-app-queue\"}", "refId": "A" }
          ]
        }
      ],
      "schemaVersion": 30,
      "version": 1,
      "title": "SQS Queue Depth"
    }
